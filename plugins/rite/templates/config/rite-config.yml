# rite-workflow configuration file
schema_version: 2

# GitHub Projects integration
github:
  projects:
    enabled: true
    project_number: null  # Project number (null = auto-detect from repository)
    owner: null           # Project owner (null = use repository owner)
    fields:
      status:
        enabled: true
        options:
          - { name: "Todo", default: true }
          - { name: "In Progress" }
          - { name: "In Review" }
          - { name: "Done" }
      priority:
        enabled: true
        options:
          - { name: "High" }
          - { name: "Medium", default: true }
          - { name: "Low" }
      complexity:
        enabled: true
        options:
          - { name: "XS" }
          - { name: "S" }
          - { name: "M", default: true }
          - { name: "L" }
          - { name: "XL" }
    # Explicit field IDs (optional, overrides auto-detection)
    # Use this when:
    #   - API auto-detection fails (e.g., permission issues, organization policy restrictions)
    #   - You want consistent field IDs without relying on auto-detection
    # Note: Option IDs (e.g., "In Progress", "Done") are always fetched via API
    # Find field IDs: gh project field-list {project_number} --owner {owner} --format json
    # field_ids:
    #   status: "PVTSSF_..."      # Status field ID
    #   priority: "PVTSSF_..."    # Priority field ID
    #   complexity: "PVTSSF_..."  # Complexity field ID

# Iteration/Sprint settings (optional)
# To use this feature, create an Iteration field in GitHub Projects manually
iteration:
  enabled: false          # true to enable iteration features
  field_name: "Sprint"    # Name of the iteration field in Projects
  auto_assign: true       # Auto-assign to current iteration on /rite:pr:open
  show_in_list: true      # Show iteration column in issue:list

# Branch naming rules
branch:
  # Base branch for feature branches (default PR target)
  base: "main"      # default: main (use "develop" for Git Flow)
  pattern: "{type}/issue-{number}-{slug}"
  # Recognized patterns for non-standard branches (optional)
  # These patterns allow rite workflow to recognize existing branches
  # that don't follow the standard issue-based naming convention
  # recognized_patterns:
  #   - "migration/phase{n}-{category}"    # e.g., migration/phase4-admin-tutorials
  #   - "i18n/{locale}"                    # e.g., i18n/zh-tw
  #   - "hotfix/{date}-{description}"      # e.g., hotfix/20250109-critical-fix

# Commit message
commit:
  contextual: true     # Contextual Commits action lines in commit body (true | false)

# Build/test/lint commands (null = auto-detect)
commands:
  build: null
  test: null
  lint: null

# Verification gate settings
verification:
  run_tests_before_pr: true          # Run tests before commit/PR (requires commands.test)
  acceptance_criteria_check: true    # Check acceptance criteria from Issue body before PR

# Issue settings
issue:
  auto_decompose_threshold: M  # XS | S | M | L | XL | none (default: M)

# Review settings
review:
  min_reviewers: 1      # Fallback when no reviewers match
  criteria:
    - file_types
    - content_analysis
  loop:
    verification_mode: false
    allow_new_findings_in_unchanged_code: false
  security_reviewer:
    mandatory: false
    recommended_for_code_changes: true
  debate:
    enabled: true
    max_rounds: 1
  confidence_threshold: 80   # Minimum confidence score for findings table (default: 80)
  fact_check:
    enabled: true
    max_claims: 20                    # External claim のみに適用（Internal Likelihood は枠外）
    use_context7: true                # context7 MCP を利用（失敗時は WebSearch fallback で自動回復）
    verify_internal_likelihood: true  # Sub-Phase B (Internal Likelihood Claim Verification) を有効化 — 詳細: plugins/rite/commands/pr/references/fact-check.md
  scope_assignment:
    # Issue #1018 M2 — scope=nit-noted 受け流し経路設定。reviewer が schema 1.1.0 で出力する
    # findings[].scope に基づく fix loop routing 制御。
    # Issue #1020 — feature flag scaffolding。新規キー (`review.scope_assignment.*`) は本テンプレ側
    # でも必ず宣言する (init で展開される値が runtime と drift しないため)。`enabled: false` で
    # scope-based routing 全体を opt-out し、fix.md は schema 1.0 互換動作 (severity-based default
    # mapping のみ) にフォールバックする。
    # ロールアウト戦略: テンプレートは新規 init ユーザ向けに保守的 default として **false** を維持
    # (本プロジェクト rite-config.yml は #1022 検証 pass 後に true 化済、テンプレ側の bump は別 Issue で再評価)。
    enabled: false           # scope-based routing 全体の opt-in/out (template default; 新規 init では false 維持)
    auto_demote_low: true    # LOW × current-pr の finding を fix.md ステップ 1.2.0 で自動的に nit-noted へ降格 (default: true)。false で opt-out した場合は LOW × current-pr が通常通り blocking 扱いで fix loop に流れる。`enabled: false` の場合は本キーは effectively false 扱い (将来の runtime gating で wiring 予定)
  # NOTE (#506 known limitation): separate_issue_creation と下記 fix.fail_fast_response は
  # config scaffolding (宣言のみ) です。現時点では prompt 側 (fix.md / review.md /
  # _reviewer-base.md) がハードコードで挙動を強制しており、これらのキーを false にしても
  # 挙動は変わりません (opt-out は動作しません)。runtime wiring は follow-up Issue で追跡されます。
  # Separate Issue Creation (#506): 別 Issue 化は人間判定必須、Source C（既存問題）報告廃止
  # 詳細: plugins/rite/commands/pr/review.md ステップ 7 (別 Issue 化は review-side に移行済、fix.md からは廃止)
  separate_issue_creation:
    require_user_confirmation: true   # true で E2E でも AskUserQuestion をスキップせず常に確認（default: true）
    report_pre_existing_issues: false # false で Source C (既存問題) の reviewer 報告を抑止（default: false）

# Fix settings (#506)
fix:
  # Fail-Fast Response Principle: throw/raise 優先の修正方針を必須化
  # 詳細: plugins/rite/commands/pr/fix.md ステップ 2 Fail-Fast Response Principle
  fail_fast_response: true            # true で Fail-Fast Response Principle を有効化（default: true）

# Notification settings
notifications:
  slack:
    enabled: false
    webhook_url: null
  discord:
    enabled: false
    webhook_url: null
  teams:
    enabled: false
    webhook_url: null

# Language setting (auto = auto-detect)
language: auto  # auto | ja | en

# Wiki settings (LLM Wiki pattern for experience heuristics)
# See docs/designs/experience-heuristics-persistence-layer.md for full specification.
# Wiki is opt-out: default is enabled. Set `enabled: false` to disable.
wiki:
  enabled: true               # true to enable Wiki features (default: true, opt-out)
  branch_strategy: "separate_branch"  # "separate_branch" (recommended) or "same_branch"
  branch_name: "wiki"         # Branch name for Wiki data (when branch_strategy is "separate_branch")
  auto_ingest: true           # Auto-ingest on review/fix/close (default: true)
  auto_query: true            # Auto-query on start/review/fix/implement (default: true)

# Flow state file format settings (Issue #672)
# See docs/designs/multi-session-state.md for full specification.
#
# ⚠️ ファイル冒頭の top-level `schema_version: 2` (rite-config.yml 自体の schema バージョン) とは
# 別系統の設定です。本セクションの `flow_state.schema_version` は `.rite-flow-state` ファイル形式の
# 選択のみを制御し、rite-config.yml schema 自体のバージョンとは無関係です。
#
# `schema_version: 2` (default) — Option A: per-session file (`.rite/sessions/{session_id}.flow-state`)。
#   並行セッションを first-class でサポート。
# `schema_version: 1` — legacy single-file (rollback path、v0.5.0 で撤去予定)。
flow_state:
  schema_version: 2

# Multi-session settings (per-session Git worktree isolation)
# See docs/designs/multi-session-worktree.md for full specification.
# Lets multiple Claude Code sessions work different Issues in the same repo
# concurrently: /rite:pr:open creates a session worktree (.rite/worktrees/issue-{N})
# and EnterWorktree-s into it, so each session keeps its own working tree /
# current branch. Default `enabled: true` (on by default since #1391); set to
# false to restore single-session behavior.
# NOTE: this is a SEPARATE axis from `parallel` (which is per-Issue sub-agent
# fan-out within a single session). Do not merge the two.
# Disk cost: each session worktree is a FULL working-tree clone — build artifacts
# (node_modules, venv, build caches) are NOT shared and may be rebuilt per worktree.
# Declared ABOVE the `--- Advanced ---` marker (like wiki / flow_state, #491) so
# /rite:init new-generation emits it as an active block (so new projects actually
# get the default-on behavior). On --upgrade it is intentionally NOT back-added to
# existing configs (see init.md Step 4 classification) to preserve backward compat.
multi_session:
  enabled: true                    # per-session worktrees (on by default, #1391); false to disable
  worktree_base: ".rite/worktrees" # session worktree base (issue-{N} subdirs)

# --- Advanced (below this line) ---
# These sections are omitted during new generation (/rite:init).
# They are added as comments during --upgrade.
# Uncomment and configure as needed.

# TDD Light mode settings (off by default)
# tdd:
#   mode: "off"              # off | light (default: off)
#   tag_prefix: "AC"         # Tag prefix for test skeleton markers
#   run_baseline: true       # Run baseline test before skeleton generation
#   max_skeletons: 20        # Maximum number of skeletons to generate per Issue

# PR review result recording (#443)
# デフォルトではレビュー結果を PR コメントには記録せず、タイムスタンプ付き
# ローカルファイル (.rite/review-results/{pr_number}-{timestamp}.json) に保存する。
# /rite:pr:fix は「会話 > ローカルファイル > PR コメント」の優先順位で自動読取する。
# `--post-comment` フラグまたは下記 `post_comment: true` で PR コメント記録を有効化できる。
pr_review:
  post_comment: false   # true で PR コメント記録を有効化（--post-comment 同等、デフォルト: false）

# Parallel implementation settings
# parallel:
#   enabled: true   # Enable parallel implementation (default: true)
#   max_agents: 3   # Maximum concurrent agents (default: 3)
#   mode: "shared"  # "shared" (default) or "worktree"
#   worktree_base: ".worktrees"

# Team-based sprint execution settings
# team:
#   enabled: true
#   max_concurrent_issues: 3
#   teammate_model: "sonnet"
#   auto_review: true

# Metrics settings
# metrics:
#   enabled: true
#   baseline_issues: 3

# Safety settings (fail-closed thresholds)
# safety:
#   max_implementation_rounds: 20
#   time_budget_minutes: 120
#   auto_stop_on_repeated_failure: true
#   repeated_failure_threshold: 3

# Wiki settings are declared above the `--- Advanced ---` marker (active by default, #491).
# See docs/designs/experience-heuristics-persistence-layer.md for full specification.

# Investigation settings
# investigate:
#   codex_review:
#     enabled: true

# Flow state settings are declared above the `--- Advanced ---` marker (active by default, Issue #672).
# See docs/designs/multi-session-state.md for full specification.
