# Claude Code Rite Workflow のリポジトリ設定（self-hosted）
schema_version: 2

# GitHub Projects 連携
github:
  projects:
    enabled: true
    project_number: 6  # cc-rite-workflow project
    owner: "B16B1RD"   # Projects オーナー（user / organization）
    fields:
      status:
        enabled: true
        options:
          - { name: "Todo", default: true }
          - { name: "In Progress" }
          - { name: "In Review" }
          - { name: "Done" }
      priority:
        enabled: true
        options:
          - { name: "High" }
          - { name: "Medium", default: true }
          - { name: "Low" }
      complexity:
        enabled: true
        options:
          - { name: "XS" }
          - { name: "S" }
          - { name: "M", default: true }
          - { name: "L" }
          - { name: "XL" }

# Iteration / Sprint 設定（任意）
iteration:
  enabled: false          # true でイテレーション機能を有効化
  field_name: "Sprint"    # Projects 上のイテレーションフィールド名
  auto_assign: true       # issue:start 時に現在のイテレーションへ自動アサイン
  show_in_list: true      # issue:list でイテレーション列を表示

# ブランチ命名規則
branch:
  base: "develop"    # 開発ベースブランチ（Git Flow）
  pattern: "{type}/issue-{number}-{slug}"

# コミットメッセージ
commit:
  contextual: true    # コミット body に Contextual Commits の action ラインを入れる

# ビルド / テスト / lint コマンド
commands:
  build: null
  test: null
  lint: null

# 検証ゲート
verification:
  run_tests_before_pr: true          # commit / PR 前にテスト実行（commands.test が必要）
  acceptance_criteria_check: true    # PR 前に Issue body の受入基準を確認

# Issue 設定
issue:
  auto_decompose_threshold: M  # XS | S | M | L | XL | none — この規模を超える Issue を自動分解

# レビュー実行設定（reviewer 選定 / debate / fact_check 等）
review:
  min_reviewers: 1      # マッチするレビュアーがいない場合の最低人数
  criteria:
    - file_types
    - content_analysis
  loop:
    verification_mode: false                       # 前回レビューコメントがある場合に検証モードを有効化
    allow_new_findings_in_unchanged_code: false    # 未変更コードへの新規指摘を blocking 扱いにするか
    # 正常出口は 0 findings のみ。以下の 4 品質シグナルのいずれかで escalate する:
    # 同一 finding 循環 / root-cause 不明 fix / cross-validation 不一致 / finding quality gate 不通過
    convergence_monitoring: true          # fingerprint ベースの循環検知
    auto_propagation_scan: true           # Fix 後の類似パターン伝播スキャン
    pre_commit_drift_check: true          # コミット前に distributed-fix-drift-check を実行
  security_reviewer:
    mandatory: false                          # 全 PR で必須選定するか
    recommended_for_code_changes: true        # 実行可能コード変更時は推奨
  debate:
    enabled: true            # レビュアー間討論フェーズ
    max_rounds: 1            # 最大討論ラウンド数（コスト制御）
  confidence_threshold: 80   # 指摘事項テーブルに含める最低確信度スコア
  fact_check:
    enabled: true            # ファクトチェック Phase
    max_claims: 10           # 1 レビューあたり最大検証数
    use_context7: false      # context7 MCP ツールによる検証を使う
  scope_assignment:
    # Issue #1018 M2 — scope=nit-noted 受け流し経路設定。reviewer が schema 1.1.0 で出力する
    # findings[].scope に基づく fix loop routing 制御。
    # Issue #1020 — feature flag scaffolding。`enabled: false` で scope-based routing 全体を opt-out
    # し、fix.md は schema 1.0 互換動作 (severity-based default mapping のみ) にフォールバックする。
    # ロールアウト戦略: 初期 false で導入 → 動作検証後に develop merge 時点で同一 PR 内の別 commit
    # で true へ bump。
    enabled: true            # scope-based routing 全体の opt-in/out (template default in plugins/rite/templates/config/rite-config.yml: false; 本リポでは #1022 検証 pass 後に true 化)
    auto_demote_low: true    # LOW × current-pr の finding を fix.md Phase 1.2.0 で自動的に nit-noted へ降格 (default: true)。false で opt-out した場合は LOW × current-pr が通常通り blocking 扱いで fix loop に流れる。`enabled: false` の場合は本キーは effectively false 扱い (将来の runtime gating で wiring 予定)
  doc_heavy:
    enabled: true                   # Doc-Heavy PR 検出 / Override
    lines_ratio_threshold: 0.6      # doc_lines / total_diff_lines の閾値
    count_ratio_threshold: 0.7      # doc_files / total_files の閾値
    max_diff_lines_for_count: 2000  # ファイル数比率判定を有効にする最大 diff 行数

# PR レビュー結果の出力設定
# 結果は `.rite/review-results/{pr_number}-{timestamp}.json` に保存される。
# /rite:pr:fix は「会話 > ローカルファイル > PR コメント」の順で自動読取する。
pr_review:
  post_comment: false   # true で PR コメントにも記録（--post-comment と同等）

# 並列実装
parallel:
  enabled: true   # 並列実装を有効化
  max_agents: 3   # 同時実行エージェント数の上限
  mode: "shared"  # "shared" (作業ディレクトリ共有) または "worktree" (各エージェントが独立 worktree)
  worktree_base: ".worktrees"  # mode が "worktree" のときの worktree ベースディレクトリ

# マルチセッション（セッション別 Git worktree 分離）
# 仕様詳細: docs/designs/multi-session-worktree.md
# 複数の Claude Code セッションが同一リポジトリで別 Issue を並行して進められるようにする。
# /rite:pr:open がセッション worktree (.rite/worktrees/issue-{N}) を作成し EnterWorktree で入場する。
# `parallel`（1 セッション内の Issue 別サブエージェント並列）とは直交する別軸のため統合しない。
# default `enabled: true`（#1391 でデフォルト ON 化）。false にすると従来の単一セッション挙動に戻る。
multi_session:
  enabled: true                    # セッション別 worktree（default ON、#1391）。false で無効化
  worktree_base: ".rite/worktrees" # セッション worktree のベース（issue-{N} サブディレクトリ）

# メトリクス
metrics:
  enabled: true            # メトリクス収集の有効/無効
  baseline_issues: 3       # ベースライン収集（measure-only 期間）の Issue 数

# 安全装置（fail-closed 閾値）
safety:
  max_implementation_rounds: 20         # Issue 1 件あたりの implementation round ハードリミット
  time_budget_minutes: 120              # Issue ごとの time budget（advisory、タイマー強制ではない）
  auto_stop_on_repeated_failure: true   # 同じ失敗クラスが連続した場合に停止
  repeated_failure_threshold: 3         # 連続失敗回数の閾値

# 調査（/investigate）
investigate:
  codex_review:
    enabled: true    # false で Phase 6（Codex クロスチェック）をスキップし代替検証を実施

# Flow state ファイル形式
# 仕様詳細: docs/designs/multi-session-state.md
#
# 本セクションの schema_version は `.rite-flow-state` ファイル形式のみを制御する。
# ファイル冒頭の top-level `schema_version` (rite-config.yml 自身のスキーマ) とは別系統。
#
# 2: per-session ファイル (`.rite/sessions/{session_id}.flow-state`)。並行セッションを first-class サポート。
# 1: legacy 単一ファイル (`.rite-flow-state`)。rollback 用。
# 旧形式は `.rite-flow-state.legacy.{timestamp}` に backup された上で自動マイグレーションされる。
flow_state:
  schema_version: 2

# Wiki（経験則永続化レイヤ）
# 仕様詳細: docs/designs/experience-heuristics-persistence-layer.md
wiki:
  enabled: true                        # Wiki 機能の有効化（opt-out）
  branch_strategy: "separate_branch"   # "separate_branch" (推奨) または "same_branch"
  branch_name: "wiki"                  # branch_strategy が "separate_branch" のときのブランチ名
  auto_ingest: true                    # review / fix / close 時に自動 ingest
  auto_query: true                     # start / review / fix / implement 時に自動 query
  auto_lint: true                      # ingest 後に /rite:wiki:lint --auto を自動実行
  growth_check:
    threshold_prs: 5                   # この件数の merged PR が raw-source ingest なしに蓄積したら lint で警告
    pr_raw_threshold: 3                # 直近 threshold_prs 件のうち raw を持たない PR がこの数以上で警告

# 言語設定
language: ja
