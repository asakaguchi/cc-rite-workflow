name: sentinel contract check

# Run sentinel-contract-check.sh (Issue #1709) on every push and pull request
# that touches a skill file or the sentinel SoT itself, so a sentinel string
# renamed in one skill without its emitter/consumer counterpart fails CI
# instead of surfacing only at runtime (silent orchestration breakage).

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'plugins/rite/skills/**'
      - 'plugins/rite/references/sentinel-contract.md'
      - 'plugins/rite/hooks/scripts/sentinel-contract-check.sh'
      - '.github/workflows/sentinel-contract-check.yml'
  pull_request:
    paths:
      - 'plugins/rite/skills/**'
      - 'plugins/rite/references/sentinel-contract.md'
      - 'plugins/rite/hooks/scripts/sentinel-contract-check.sh'
      - '.github/workflows/sentinel-contract-check.yml'

# Least-privilege permissions (same rationale as test-hooks.yml): read-only,
# no write-back to the repository.
permissions:
  contents: read

# Cancel in-flight runs on the same ref (same rationale as test-hooks.yml).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sentinel-contract-check:
    name: Verify sentinel SoT sync
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # actions/checkout pinned by full SHA (v4.2.2) for supply-chain
      # integrity — same convention as test-hooks.yml.
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - name: Run sentinel contract check
        run: bash plugins/rite/hooks/scripts/sentinel-contract-check.sh --all
